<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <title>Neural Orbiter // Task Management System</title>
    
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#010208" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
      /* CRITICAL CSS: Inlined to prevent blank screen on mobile */
      :root { --bg: #010208; --glow: #00e5ff; }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: var(--bg);
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }

      #neural-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        background: var(--bg);
        opacity: 1;
        transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: auto;
      }

      #neural-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .orb-frame {
        position: relative;
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .loader-logo {
        width: 60px;
        height: 60px;
        z-index: 10;
        filter: drop-shadow(0 0 15px var(--glow));
        animation: breathe 2s ease-in-out infinite;
        object-fit: contain;
      }

      .scanner-ring {
        position: absolute;
        inset: 0;
        border: 2px solid rgba(0, 229, 255, 0.05);
        border-top: 2px solid var(--glow);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        width: 100%;
        max-width: 280px;
        margin: 0 auto;
        padding: 0 20px;
        box-sizing: border-box;
      }

      .status-label {
        margin-top: 35px;
        font-family: 'Orbitron', sans-serif;
        font-size: 11px;
        letter-spacing: 3px;
        color: var(--glow);
        text-transform: uppercase;
        text-align: center;
        animation: flicker 1.5s infinite;
        white-space: nowrap;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes breathe {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.08); opacity: 1; }
      }
      @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

      .fade-out { opacity: 0; pointer-events: none; }
      .loader-content,
      .status-label,
      .orb-frame {
        min-width: 0;
      }

      @media (max-width: 640px) {
        .orb-frame {
          width: 100px;
          height: 100px;
        }
        .loader-logo {
          width: 50px;
          height: 50px;
        }
        .status-label {
          font-size: 10px;
          letter-spacing: 2px;
          margin-top: 30px;
        }
      }

      @media (max-height: 600px) {
        .loader-content {
          justify-content: center;
        }
        .status-label {
          margin-top: 20px;
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="neural-loader">
        <div class="loader-content">
          <div class="orb-frame">
            <img src="/android-chrome-192x192.png" class="loader-logo" alt="Orbiter">
            <div class="scanner-ring"></div>
          </div>
          <div class="status-label">Neural Sync Active</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
