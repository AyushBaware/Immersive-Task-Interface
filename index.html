<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <title>Neural Orbiter // Task Management System</title>
    
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0891b2" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Orbiter">

    <meta name="description" content="A high-performance 3D task management interface powered by neural synchronization." />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
      /* INSTANT RENDER CRITICAL CSS */
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #010208;
        overscroll-behavior-y: contain; 
      }

      #neural-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        background: #010208;
        opacity: 1;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #neural-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }

      .orb-wrapper {
        position: relative;
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .loader-icon-center {
        width: 50px;
        height: 50px;
        z-index: 2;
        filter: drop-shadow(0 0 15px #00e5ff);
        animation: pulse-icon 1.5s ease-in-out infinite;
      }

      .ring-system {
        position: absolute;
        inset: 0;
        border: 2px solid rgba(0, 229, 255, 0.05);
        border-top: 2px solid #00e5ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite; /* Faster spin for "high performance" feel */
      }

      .status-text {
        font-family: 'Orbitron', sans-serif;
        font-size: 11px;
        letter-spacing: 4px;
        color: #00e5ff;
        text-transform: uppercase;
        animation: flicker 1.5s infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse-icon {
        0%, 100% { opacity: 0.7; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      @keyframes flicker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="neural-loader">
        <div class="loader-content">
          <div class="orb-wrapper">
            <img src="/android-chrome-192x192.png" class="loader-icon-center" alt="Logo">
            <div class="ring-system"></div>
          </div>
          <div class="status-text">Synchronizing Neural Link</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
